name: Conditional Sync Upstream

on:
  schedule:
    - cron: '0 * * * *' # ogni ora
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  sync-upstream:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Backup files and force sync upstream
        id: sync
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          # Autenticazione push con token GitHub Actions
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

          # Aggiungi upstream se non esiste
          git remote get-url upstream || git remote add upstream https://github.com/UrloMythus/MammaMia.git

          # Scarica aggiornamenti upstream
          git fetch upstream

          # Controlla differenze
          if git diff --quiet HEAD upstream/main; then
            echo "Repository already up to date"
            echo "no_change=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Changes detected, syncing repository"

          backup_dir=".git/backup_files"

          mkdir -p "$backup_dir/.github/workflows"
          mkdir -p "$backup_dir/Dockerfiles"

          # Backup file personalizzati
          [ -f config.json ] && cp config.json "$backup_dir/config.json"
          [ -f update_domains.py ] && cp update_domains.py "$backup_dir/update_domains.py"

          # Backup workflows
          if [ -d .github/workflows ]; then
            cp -r .github/workflows/* "$backup_dir/.github/workflows/" || true
          fi

          # Backup Dockerfiles
          if [ -d Dockerfiles ]; then
            cp -r Dockerfiles/* "$backup_dir/Dockerfiles/" || true
          fi

          # Vai su main
          git checkout main || git checkout -b main

          # Reset completo a upstream/main
          git reset --hard upstream/main

          # Ripristina file personalizzati
          [ -f "$backup_dir/config.json" ] && cp "$backup_dir/config.json" config.json
          [ -f "$backup_dir/update_domains.py" ] && cp "$backup_dir/update_domains.py" update_domains.py

          # Ripristina workflows
          mkdir -p .github/workflows
          if [ -d "$backup_dir/.github/workflows" ]; then
            cp -r "$backup_dir/.github/workflows/"* .github/workflows/ || true
          fi

          # Ripristina Dockerfiles
          mkdir -p Dockerfiles
          if [ -d "$backup_dir/Dockerfiles" ]; then
            cp -r "$backup_dir/Dockerfiles/"* Dockerfiles/ || true
          fi

          # Commit modifiche
          git add .

          git commit -m "Restore custom files after upstream sync" || echo "No changes to commit"

          # Push forzato
          git push origin main --force

          echo "no_change=false" >> $GITHUB_OUTPUT

          # Cleanup
          rm -rf "$backup_dir"

      - name: Sync completed
        if: steps.sync.outputs.no_change == 'false'
        run: echo "Repository synced successfully."
